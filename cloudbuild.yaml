# Pulse — Cloud Build CI/CD Pipeline
# Trigger: push to main branch
# Builds and deploys both services to Cloud Run

substitutions:
  _REGION: us-central1
  _BACKEND_SERVICE: pulse-backend
  _FRONTEND_SERVICE: pulse-web
  _SERVICE_ACCOUNT: vertex-express@${PROJECT_ID}.iam.gserviceaccount.com

steps:
  # 1. Build backend image
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/pulse/${_BACKEND_SERVICE}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/pulse/${_BACKEND_SERVICE}:latest
      - ./agent-server

  # 2. Build frontend image (parallel)
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/pulse/${_FRONTEND_SERVICE}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/pulse/${_FRONTEND_SERVICE}:latest
      - ./web

  # 3. Push backend image
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/pulse/${_BACKEND_SERVICE}
    waitFor: [build-backend]

  # 4. Push frontend image
  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/pulse/${_FRONTEND_SERVICE}
    waitFor: [build-frontend]

  # 5. Deploy backend to Cloud Run
  - name: gcr.io/cloud-builders/gcloud
    id: deploy-backend
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --region=${_REGION}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/pulse/${_BACKEND_SERVICE}:${SHORT_SHA}
      - --service-account=${_SERVICE_ACCOUNT}
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --port=3001
      - --set-env-vars=NODE_ENV=production
    waitFor: [push-backend]

  # 6. Deploy frontend to Cloud Run
  - name: gcr.io/cloud-builders/gcloud
    id: deploy-frontend
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --region=${_REGION}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/pulse/${_FRONTEND_SERVICE}:${SHORT_SHA}
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --port=3000
    waitFor: [push-frontend, deploy-backend]

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/pulse/${_BACKEND_SERVICE}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/pulse/${_FRONTEND_SERVICE}
