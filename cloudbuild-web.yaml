steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=NEXT_PUBLIC_API_URL=${_BACKEND_URL}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/pulse-web'
      - './web'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/pulse-web']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pulse-web'
      - '--image=gcr.io/$PROJECT_ID/pulse-web'
      - '--region=us-central1'
      - '--port=3000'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
substitutions:
  _BACKEND_URL: 'https://pulse-backend-CHANGE_ME.run.app'
images:
  - 'gcr.io/$PROJECT_ID/pulse-web'
