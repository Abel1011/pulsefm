steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/pulse-backend', './agent-server']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/pulse-backend']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pulse-backend'
      - '--image=gcr.io/$PROJECT_ID/pulse-backend'
      - '--region=us-central1'
      - '--port=3001'
      - '--allow-unauthenticated'
      - '--session-affinity'
      - '--min-instances=1'
      - '--memory=512Mi'
images:
  - 'gcr.io/$PROJECT_ID/pulse-backend'
